<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank you · Forest & Flock</title>
<style>
  :root{
    --sage:#6f8a4e; --terra:#b9714e; --gold:#c19e4a; --navy:#1c2a40;
    --cream:#faf6ef; --soft:#cdc6ba; --gray:#5d574e;
  }
  *{box-sizing:border-box;}
  body{background:var(--cream); color:var(--navy); font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center;}
  .card{background:#fff; border-radius:14px; padding:44px 48px; max-width:520px; margin:20px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.06); border:1px solid var(--soft);}
  .logo{width:100px; margin:0 auto 14px; display:block;}
  h1{font-family:Georgia,serif; color:var(--navy); font-size:2rem; margin:0 0 10px;}
  p{color:var(--gray); font-size:1.05rem; line-height:1.6; margin:0 0 14px;}
  .cta{display:inline-block; background:var(--navy); color:var(--cream); padding:12px 26px; border-radius:8px; text-decoration:none; margin-top:20px; font-size:1rem;}
  .cta:hover{background:#16223a;}
  .warm{color:var(--terra); font-style:italic; margin-top:20px; font-size:.98rem;}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="logo.svg" alt="Forest & Flock logo">
  <h1>Thank you! 🌲🪿</h1>
  <p>Your Forest &amp; Flock Pet Care intake form is on its way to me. I'll review everything and reach out soon to confirm details.</p>
  <p>You should receive a confirmation email at the address you provided.</p>
  <p class="warm">Your pets are going to be in good, warm hands.</p>
  <a href="/forest-and-flock/" class="cta">Back to Forest &amp; Flock</a>
</div>
</body>
</html>
